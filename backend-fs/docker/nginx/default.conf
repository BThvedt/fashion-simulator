server {
    listen 80;
    server_name _;

    # Drupal lives in web/ (recommended-project layout); the repo root is
    # bind-mounted at /var/www/html, so the docroot is /var/www/html/web.
    root /var/www/html/web;
    index index.php;

    client_max_body_size 64M;

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { allow all; log_not_found off; access_log off; }

    # Very rarely should these ever be accessed outside of your site.
    location ~* \.(txt|log)$ { deny all; }

    location ~ \..*/.*\.php$ { return 403; }
    location ~ ^/sites/.*/private/ { return 403; }

    # Block access to "hidden" files and directories.
    location ~ (^|/)\. { return 403; }

    # Allow ACME / Let's Encrypt and other well-known paths.
    location ~* ^/.well-known/ { allow all; }

    location / {
        try_files $uri /index.php?$query_string;
    }

    location @rewrite {
        rewrite ^ /index.php;
    }

    # Don't allow direct access to PHP files in the files directory.
    location ~ ^/sites/[^/]+/files/.*\.php$ { deny all; }

    # Front controllers and update.php only.
    location ~ '\.php$|^/update.php' {
        fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_intercept_errors on;
        fastcgi_read_timeout 300;
        fastcgi_pass php:9000;
    }

    # Image style generation and private files routed back through Drupal.
    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;
    }
    location ~ ^(/[a-z\-]+)?/system/files/ {
        try_files $uri /index.php?$query_string;
    }

    # Static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        try_files $uri @rewrite;
        expires max;
        log_not_found off;
    }
}
