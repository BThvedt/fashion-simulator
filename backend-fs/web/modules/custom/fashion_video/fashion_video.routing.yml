fashion_video.pose_images:
  path: '/fashion-video/{uuid}/pose-images'
  defaults:
    _controller: 'Drupal\fashion_video\Controller\FashionVideoUploadController::poseImages'
  methods: [POST]
  requirements:
    _user_is_logged_in: 'TRUE'
    uuid: '[0-9a-fA-F-]+'
  options:
    _auth: ['oauth2', 'cookie']
    no_cache: 'TRUE'

fashion_video.media:
  path: '/fashion-video/{uuid}/media'
  defaults:
    _controller: 'Drupal\fashion_video\Controller\FashionVideoUploadController::media'
  methods: [GET]
  requirements:
    _user_is_logged_in: 'TRUE'
    uuid: '[0-9a-fA-F-]+'
  options:
    _auth: ['oauth2', 'cookie']
    no_cache: 'TRUE'

fashion_video.generate_images:
  path: '/fashion-video/{uuid}/generate-images'
  defaults:
    _controller: 'Drupal\fashion_video\Controller\FashionVideoUploadController::generateImages'
  methods: [POST]
  requirements:
    _user_is_logged_in: 'TRUE'
    uuid: '[0-9a-fA-F-]+'
  options:
    _auth: ['oauth2', 'cookie']
    no_cache: 'TRUE'
