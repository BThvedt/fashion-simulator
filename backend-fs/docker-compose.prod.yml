services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fashionsimulator.rule=Host(`fashionsimulator.do-bkend.click`)"
      - "traefik.http.routers.fashionsimulator.entrypoints=websecure"
      - "traefik.http.routers.fashionsimulator.tls.certresolver=letsencrypt"
      - "traefik.http.services.fashionsimulator.loadbalancer.server.port=80"
    # NO `ports:` block — Traefik owns the public ports
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - default
      - traefik-public

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASSWORD: ${DB_PASSWORD}
      HASH_SALT: ${HASH_SALT}
    depends_on:
      - db

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    external: true
    name: fashionsimulator_db_data    # MUST be unique across all sites on the droplet

networks:
  traefik-public:
    external: true
