name: Deploy backend
on:
  push:
    branches: [main]
    paths:
      - 'backend-fs/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/fashion-simulator
            git pull origin main
            cd backend-fs
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T php composer install --no-dev --optimize-autoloader
            docker compose -f docker-compose.prod.yml exec -T php vendor/bin/drush deploy